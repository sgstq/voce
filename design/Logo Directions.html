<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Duper Disper — Logo directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --a: oklch(0.55 0.17 285);
    --a-ink:#fff;
    --paper: oklch(0.95 0.006 80);
    --card:#fff;
    --ink: oklch(0.24 0.012 65);
    --soft: oklch(0.5 0.012 65);
    --faint: oklch(0.66 0.01 65);
    --line: oklch(0.91 0.006 75);
    --tile-r: 22px;
  }
  [data-theme="dark"]{
    --paper: oklch(0.18 0.008 70);
    --card: oklch(0.235 0.009 70);
    --ink: oklch(0.95 0.004 83);
    --soft: oklch(0.74 0.008 78);
    --faint: oklch(0.56 0.008 75);
    --line: oklch(0.32 0.009 72);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);font-family:"Hanken Grotesk",system-ui,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 32px 80px;}
  header{display:flex;align-items:center;gap:16px;margin-bottom:8px;}
  h1{font-size:23px;font-weight:800;letter-spacing:-.6px;margin:0;white-space:nowrap;}
  .sub{font-size:14px;color:var(--faint);margin:14px 0 26px;}
  .controls{margin-left:auto;display:flex;align-items:center;gap:14px;}
  .swatches{display:flex;gap:8px;}
  .sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0;}
  .sw.on{border-color:var(--ink);}
  .btn{height:34px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font:600 13px/1 "Hanken Grotesk",sans-serif;cursor:pointer;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 18px 16px;
    display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .stage{height:96px;display:flex;align-items:center;justify-content:center;}
  .tile{width:72px;height:72px;border-radius:var(--tile-r);background:var(--a);position:relative;
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .name{font-weight:700;font-size:14px;letter-spacing:-.2px;}
  .desc{font-size:11.5px;color:var(--faint);text-align:center;line-height:1.45;min-height:30px;}
  .num{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--faint);align-self:flex-start;}
  i,b,u,s{font-style:normal;font-weight:inherit;}

  /* ============ 1 · DISPERSE — dots fan out (plays on the name) ============ */
  .m-disperse i{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--a-ink);}
  .m-disperse .c{animation:dPulse 2.4s ease-in-out infinite;}
  .m-disperse .s{width:6px;height:6px;}
  .m-disperse .s1{animation:disp1 2.4s ease-in-out infinite;}
  .m-disperse .s2{animation:disp2 2.4s ease-in-out infinite;}
  .m-disperse .s3{animation:disp3 2.4s ease-in-out infinite;}
  @keyframes dPulse{0%,100%{transform:scale(1)}40%{transform:scale(.7)}}
  @keyframes disp1{0%,20%{transform:translate(0,0);opacity:0}55%{transform:translate(18px,-13px);opacity:1}90%,100%{transform:translate(22px,-16px);opacity:0}}
  @keyframes disp2{0%,20%{transform:translate(0,0);opacity:0}55%{transform:translate(20px,4px);opacity:1}90%,100%{transform:translate(24px,6px);opacity:0}}
  @keyframes disp3{0%,20%{transform:translate(0,0);opacity:0}55%{transform:translate(12px,18px);opacity:1}90%,100%{transform:translate(15px,22px);opacity:0}}

  /* ============ 2 · TYPING — three dots, voice becoming text ============ */
  .m-type{display:flex;gap:7px;}
  .m-type i{width:10px;height:10px;border-radius:50%;background:var(--a-ink);}
  .m-type i:nth-child(1){animation:typed 1.4s ease-in-out infinite;}
  .m-type i:nth-child(2){animation:typed 1.4s ease-in-out .18s infinite;}
  .m-type i:nth-child(3){animation:typed 1.4s ease-in-out .36s infinite;}
  @keyframes typed{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-9px);opacity:1}}

  /* ============ 3 · CARET — insertion point drops into a field ============ */
  .m-caret{position:relative;width:40px;height:40px;}
  .m-caret .bar{position:absolute;left:50%;top:6px;width:5px;height:22px;border-radius:3px;background:var(--a-ink);
    transform:translateX(-50%);transform-origin:top;animation:caretDrop 1.8s cubic-bezier(.3,1.4,.4,1) infinite;}
  .m-caret .line{position:absolute;left:8px;right:8px;bottom:7px;height:4px;border-radius:2px;background:var(--a-ink);opacity:.5;
    transform-origin:left;animation:caretLine 1.8s ease-in-out infinite;}
  @keyframes caretDrop{0%{transform:translateX(-50%) translateY(-14px) scaleY(.2);opacity:0}30%{opacity:1}55%{transform:translateX(-50%) translateY(0) scaleY(1);opacity:1}80%,100%{transform:translateX(-50%) translateY(0) scaleY(1);opacity:1}}
  @keyframes caretLine{0%,30%{transform:scaleX(.3);opacity:.25}60%{transform:scaleX(1);opacity:.6}100%{transform:scaleX(1);opacity:.5}}

  /* ============ 4 · LISTEN — concentric pulse rings ============ */
  .m-listen{position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}
  .m-listen .dot{width:12px;height:12px;border-radius:50%;background:var(--a-ink);}
  .m-listen .ring{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid var(--a-ink);}
  .m-listen .r1{animation:ring 2s ease-out infinite;}
  .m-listen .r2{animation:ring 2s ease-out 1s infinite;}
  @keyframes ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(3.1);opacity:0}}

  /* ============ 5 · ORBIT — a captured voice circling in ============ */
  .m-orbit{position:relative;width:48px;height:48px;}
  .m-orbit .core{position:absolute;left:50%;top:50%;width:11px;height:11px;border-radius:50%;background:var(--a-ink);transform:translate(-50%,-50%);}
  .m-orbit .track{position:absolute;inset:4px;border-radius:50%;border:2px dashed rgba(255,255,255,.35);}
  .m-orbit .sat{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;animation:spin 2.6s linear infinite;}
  .m-orbit .sat i{position:absolute;top:-1px;left:50%;width:8px;height:8px;border-radius:50%;background:var(--a-ink);transform:translateX(-50%);}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ 6 · SCATTER — burst then regroup ============ */
  .m-scatter i{position:absolute;width:8px;height:8px;border-radius:2px;background:var(--a-ink);}
  .m-scatter .p1{animation:sc1 2.2s ease-in-out infinite;}
  .m-scatter .p2{animation:sc2 2.2s ease-in-out infinite;}
  .m-scatter .p3{animation:sc3 2.2s ease-in-out infinite;}
  .m-scatter .p4{animation:sc4 2.2s ease-in-out infinite;}
  @keyframes sc1{0%,100%{transform:translate(-3px,-3px)}45%{transform:translate(-15px,-15px)}}
  @keyframes sc2{0%,100%{transform:translate(3px,-3px)}45%{transform:translate(15px,-15px)}}
  @keyframes sc3{0%,100%{transform:translate(-3px,3px)}45%{transform:translate(-15px,15px)}}
  @keyframes sc4{0%,100%{transform:translate(3px,3px)}45%{transform:translate(15px,15px)}}

  /* ============ 7 · TRANSCRIBE — lines of text writing in ============ */
  .m-lines{display:flex;flex-direction:column;gap:6px;width:40px;}
  .m-lines i{height:5px;border-radius:3px;background:var(--a-ink);transform-origin:left;}
  .m-lines i:nth-child(1){animation:ln 2.4s ease-in-out infinite;}
  .m-lines i:nth-child(2){width:80%;animation:ln 2.4s ease-in-out .35s infinite;}
  .m-lines i:nth-child(3){width:55%;animation:ln 2.4s ease-in-out .7s infinite;}
  @keyframes ln{0%,10%{transform:scaleX(0);opacity:.3}40%{transform:scaleX(1);opacity:1}85%,100%{transform:scaleX(1);opacity:1}}

  /* ============ 8 · MONOGRAM — DD with a light sweep ============ */
  .m-mono{font-family:"Hanken Grotesk";font-weight:800;font-size:34px;letter-spacing:-3px;color:var(--a-ink);position:relative;}
  .m-mono::after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.7) 50%,transparent 65%);
    background-size:250% 100%;animation:sweep 2.6s ease-in-out infinite;mix-blend-mode:overlay;}
  @keyframes sweep{0%{background-position:160% 0}55%,100%{background-position:-160% 0}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Duper Disper — logo directions</h1>
    </div>
    <div class="controls">
      <div class="swatches" id="sw"></div>
      <button class="btn" id="theme">Dark</button>
    </div>
  </header>
  <p class="sub">Eight animated marks, none of them a waveform. Tell me a number (or two to combine) and I'll wire it into the app.</p>

  <div class="grid" id="grid"></div>
</div>

<script>
  const ACCENTS = ["oklch(0.55 0.17 285)","oklch(0.55 0.15 250)","oklch(0.60 0.13 165)","oklch(0.66 0.14 65)","oklch(0.62 0.18 28)"];
  const sw = document.getElementById('sw');
  ACCENTS.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='sw'+(i===0?' on':''); b.style.background=c;
    b.onclick=()=>{document.documentElement.style.setProperty('--a',c); [...sw.children].forEach(x=>x.classList.remove('on')); b.classList.add('on');};
    sw.appendChild(b);
  });
  const themeBtn=document.getElementById('theme');
  themeBtn.onclick=()=>{const d=document.documentElement.getAttribute('data-theme')==='dark'; document.documentElement.setAttribute('data-theme',d?'light':'dark'); themeBtn.textContent=d?'Dark':'Light';};

  const MARKS=[
    ['Disperse','Dots scatter outward from a core — a literal nod to "Disper".',
      '<div class="tile m-disperse"><i class="c"></i><i class="s s1"></i><i class="s s2"></i><i class="s s3"></i></div>'],
    ['Typing','Three dots bounce — speech turning into typed text.',
      '<div class="tile"><div class="m-type"><i></i><i></i><i></i></div></div>'],
    ['Caret drop','An insertion caret drops into a text field, then settles.',
      '<div class="tile"><div class="m-caret"><span class="bar"></span><span class="line"></span></div></div>'],
    ['Listen','A center dot with concentric pulse rings — actively listening.',
      '<div class="tile"><div class="m-listen"><span class="ring r1"></span><span class="ring r2"></span><span class="dot"></span></div></div>'],
    ['Orbit','A captured voice circles the core and settles in.',
      '<div class="tile"><div class="m-orbit"><span class="track"></span><span class="core"></span><span class="sat"><i></i></span></div></div>'],
    ['Scatter','Four squares burst apart and regroup — disperse + return.',
      '<div class="tile m-scatter"><i class="p1"></i><i class="p2"></i><i class="p3"></i><i class="p4"></i></div>'],
    ['Transcribe','Lines of text write themselves in, one after another.',
      '<div class="tile"><div class="m-lines"><i></i><i></i><i></i></div></div>'],
    ['Monogram','A bold "dd" with a slow light sweep.',
      '<div class="tile"><div class="m-mono">dd</div></div>'],
  ];
  const grid=document.getElementById('grid');
  MARKS.forEach((m,i)=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML='<div class="num">0'+(i+1)+'</div><div class="stage">'+m[2]+'</div><div class="name">'+m[0]+'</div><div class="desc">'+m[1]+'</div>';
    grid.appendChild(card);
  });
</script>
</body>
</html>
